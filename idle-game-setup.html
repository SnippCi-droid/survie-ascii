<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survie ASCII - Idle Game</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-compat/app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-compat/auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-compat/firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0e27;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            line-height: 1.2;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-panel {
            background: #1a1f3a;
            border: 2px solid #00ff00;
            padding: 15px;
            text-align: center;
        }

        .game-viewport {
            background: #0a0e27;
            border: 2px solid #00ff00;
            padding: 15px;
            flex: 1;
            overflow: auto;
            font-size: 12px;
            white-space: pre;
        }

        .stats-panel {
            background: #1a1f3a;
            border: 2px solid #00ff00;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }

        .stat-item {
            border: 1px solid #00aa00;
            padding: 8px;
        }

        .stat-label {
            color: #00aa00;
            font-size: 11px;
        }

        .stat-value {
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
        }

        .side-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #1a1f3a;
            border: 2px solid #00ff00;
            padding: 15px;
            overflow-y: auto;
            max-height: 400px;
        }

        .panel h3 {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #00aa00;
            padding-bottom: 5px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #003300;
            font-size: 12px;
        }

        .leaderboard-rank {
            color: #ffaa00;
            font-weight: bold;
        }

        .leaderboard-name {
            color: #00ff00;
        }

        .leaderboard-score {
            color: #00aa00;
        }

        button {
            background: #1a1f3a;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 5px 0;
            width: 100%;
            transition: all 0.2s;
        }

        button:hover {
            background: #00ff00;
            color: #0a0e27;
        }

        button:active {
            transform: scale(0.98);
        }

        input {
            background: #0a0e27;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 8px;
            font-family: 'Courier New', monospace;
            width: 100%;
            margin: 5px 0;
        }

        .message {
            background: #0a0e27;
            border: 1px solid #003300;
            padding: 8px;
            margin: 5px 0;
            font-size: 11px;
            border-radius: 3px;
        }

        .message-author {
            color: #ffaa00;
            font-weight: bold;
        }

        .message-text {
            color: #00ff00;
            margin-top: 3px;
        }

        .loading {
            color: #ffaa00;
            text-align: center;
        }

        .error {
            color: #ff0000;
            border: 2px solid #ff0000 !important;
        }

        .hidden {
            display: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-buttons button {
            margin: 0;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }
            .side-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-panel">
            <!-- Auth -->
            <div id="authPanel" class="auth-panel">
                <h2>🎮 SURVIE ASCII</h2>
                <p style="margin: 10px 0; font-size: 12px;">Connectez-vous avec Google</p>
                <button id="googleSignIn">🔐 Se connecter avec Google</button>
                <button id="anonSignIn" style="margin-top: 5px;">👤 Jouer en Anonyme</button>
                <div id="userInfo" class="hidden" style="margin-top: 10px;">
                    <p id="userName"></p>
                    <button id="signOut">Se déconnecter</button>
                </div>
            </div>

            <!-- Game Viewport -->
            <div class="game-viewport" id="gameViewport">
INITIALISATION...

         ___
        /   \
       /|O.O|\
      / |___| \
        / | \
       /  |  \
      /   |   \
     
             </div>

            <!-- Stats -->
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-label">NIVEAU</div>
                    <div class="stat-value" id="levelStat">1</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">EXP</div>
                    <div class="stat-value" id="expStat">0/100</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">NOURRITURE</div>
                    <div class="stat-value" id="foodStat">100</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">EAU</div>
                    <div class="stat-value" id="waterStat">100</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">BOIS</div>
                    <div class="stat-value" id="woodStat">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">PIERRE</div>
                    <div class="stat-value" id="stoneStat">0</div>
                </div>
            </div>

            <!-- Actions -->
            <div style="background: #1a1f3a; border: 2px solid #00ff00; padding: 15px;">
                <p style="font-size: 12px; margin-bottom: 10px;">⚙️ ACTIONS</p>
                <div class="action-buttons">
                    <button onclick="gameState.gather('wood')">🌳 Bois</button>
                    <button onclick="gameState.gather('stone')">🪨 Pierre</button>
                    <button onclick="gameState.gather('food')">🍎 Nourriture</button>
                    <button onclick="gameState.gather('water')">💧 Eau</button>
                    <button onclick="gameState.rest()">😴 Repos</button>
                    <button onclick="gameState.explore()">🗺️ Explorer</button>
                </div>
            </div>
        </div>

        <!-- Side Panels -->
        <div class="side-panel">
            <!-- Leaderboard -->
            <div class="panel">
                <h3>🏆 LEADERBOARD</h3>
                <div id="leaderboard">Chargement...</div>
            </div>

            <!-- Chat -->
            <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
                <h3>💬 CHAT</h3>
                <div id="chatMessages" style="flex: 1; overflow-y: auto; margin-bottom: 10px;"></div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="chatInput" placeholder="Message..." style="margin: 0;">
                    <button id="chatSendBtn" style="width: 50px; margin: 0;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ FIREBASE CONFIG ============
        const firebaseConfig = {
            apiKey: "AIzaSyDOCu4Tj_example_CHANGE_ME",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        let db, auth, currentUser = null;

        // ============ GAME STATE ============
        const gameState = {
            level: 1,
            exp: 0,
            expRequired: 100,
            food: 100,
            water: 100,
            wood: 0,
            stone: 0,
            health: 100,
            lastSave: Date.now(),
            baseFrame: 0,
            survivalTime: 0,

            gather(resource) {
                if (this.food <= 0 || this.water <= 0) {
                    updateViewport("⚠️  Tu es mort de faim/soif!");
                    return;
                }
                
                const amounts = { wood: 15, stone: 8, food: 20, water: 15 };
                this[resource] += amounts[resource];
                this.food -= 2;
                this.water -= 2;
                this.exp += 10;
                this.checkLevelUp();
                updateViewport(`➕ +${amounts[resource]} ${resource.toUpperCase()}`);
            },

            rest() {
                if (this.food > 20 && this.water > 20) {
                    this.food -= 20;
                    this.water -= 20;
                    this.health = Math.min(100, this.health + 50);
                    this.exp += 5;
                    updateViewport("😴 Repos récupérateur...");
                } else {
                    updateViewport("⚠️  Pas assez de ressources!");
                }
            },

            explore() {
                if (this.food <= 0 || this.water <= 0) {
                    updateViewport("⚠️  Tu es trop faible!");
                    return;
                }
                const reward = Math.floor(Math.random() * 30);
                this.exp += reward;
                this.food -= 10;
                this.water -= 10;
                updateViewport(`🗺️  Découverte! +${reward} EXP`);
                this.checkLevelUp();
            },

            checkLevelUp() {
                while (this.exp >= this.expRequired) {
                    this.exp -= this.expRequired;
                    this.level++;
                    this.expRequired = Math.floor(this.expRequired * 1.2);
                    updateViewport(`⭐ LEVEL UP! Niveau ${this.level}`);
                }
            },

            decay() {
                this.survivalTime++;
                if (this.survivalTime % 3 === 0) this.food -= 1;
                if (this.survivalTime % 4 === 0) this.water -= 1;
                
                if (this.food <= 0 || this.water <= 0) {
                    this.health -= 5;
                }
            }
        };

        // ============ RENDERING ============
        function drawPlayer() {
            const frame = Math.floor((gameState.baseFrame / 5) % 4);
            const frames = [
                `   ___
  /   \\
 /|O.O|\\
/ |___| \\
  / | \\
 /  |  \\`,
                `   ___
  /   \\
 /|O.O|\\
/ |___| \\
   \\| /
    | |`,
                `   ___
  /   \\
 /|O.O|\\
/ |___| \\
  / | \\
 /  |  \\`,
                `   ___
  /   \\
 /|o.o|\\
/ |___| \\
   \\| /
    | |`
            ];
            return frames[frame];
        }

        function updateViewport(message = "") {
            const viewport = document.getElementById('gameViewport');
            let display = drawPlayer() + "\n\n";
            display += "┌─────────────────────────┐\n";
            display += "│ MONDE INCONNU - PALIER 1│\n";
            display += "├─────────────────────────┤\n";
            display += `│ 🏥 HP: ${gameState.health}%\n`;
            display += `│ ⏱️  Temps: ${Math.floor(gameState.survivalTime / 10)}s\n`;
            display += `│ 📍 Position: (${Math.floor(Math.random()*100)},${Math.floor(Math.random()*100)})\n`;
            display += "└─────────────────────────┘\n\n";
            if (message) {
                display += `📢 ${message}`;
            }
            viewport.textContent = display;
        }

        function updateStats() {
            document.getElementById('levelStat').textContent = gameState.level;
            document.getElementById('expStat').textContent = `${gameState.exp}/${gameState.expRequired}`;
            document.getElementById('foodStat').textContent = Math.max(0, gameState.food);
            document.getElementById('waterStat').textContent = Math.max(0, gameState.water);
            document.getElementById('woodStat').textContent = gameState.wood;
            document.getElementById('stoneStat').textContent = gameState.stone;
        }

        // ============ FIREBASE FUNCTIONS ============
        async function initFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();

                // Setup sign-in button
                document.getElementById('googleSignIn').onclick = googleSignIn;
                document.getElementById('anonSignIn').onclick = anonSignIn;
                document.getElementById('signOut').onclick = () => auth.signOut();

                auth.onAuthStateChanged(async (user) => {
                    currentUser = user;
                    if (user) {
                        document.getElementById('authPanel').classList.add('hidden');
                        document.getElementById('userInfo').classList.remove('hidden');
                        document.getElementById('userName').textContent = `👤 ${user.displayName || user.email || 'Joueur'}`;
                        
                        await loadGameState();
                        startGameLoop();
                    } else {
                        document.getElementById('authPanel').classList.remove('hidden');
                        document.getElementById('userInfo').classList.add('hidden');
                        resetGameState();
                    }
                });
            } catch (e) {
                console.error("Firebase init failed:", e);
                updateViewport("❌ Erreur Firebase - vérifiez config");
            }
        }

        async function googleSignIn() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            } catch (e) {
                console.error("Auth error:", e);
            }
        }

        async function anonSignIn() {
            try {
                await auth.signInAnonymously();
            } catch (e) {
                console.error("Anon auth error:", e);
            }
        }

        async function loadGameState() {
            if (!currentUser) return;
            try {
                const doc = await db.collection('players').doc(currentUser.uid).get();
                if (doc.exists) {
                    Object.assign(gameState, doc.data());
                } else {
                    saveGameState();
                }
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        async function saveGameState() {
            if (!currentUser || currentUser.isAnonymous) return;
            try {
                await db.collection('players').doc(currentUser.uid).set({
                    level: gameState.level,
                    exp: gameState.exp,
                    food: gameState.food,
                    water: gameState.water,
                    wood: gameState.wood,
                    stone: gameState.stone,
                    health: gameState.health,
                    survivalTime: gameState.survivalTime,
                    username: currentUser.displayName || "Joueur",
                    lastUpdate: new Date()
                }, { merge: true });

                await db.collection('leaderboard').doc(currentUser.uid).set({
                    username: currentUser.displayName || "Joueur",
                    score: gameState.level * 100 + gameState.exp,
                    level: gameState.level,
                    lastUpdate: new Date()
                }, { merge: true });
            } catch (e) {
                console.error("Save error:", e);
            }
        }

        async function loadLeaderboard() {
            try {
                const snapshot = await db.collection('leaderboard')
                    .orderBy('score', 'desc')
                    .limit(10)
                    .get();
                
                let html = '';
                snapshot.forEach((doc, idx) => {
                    const data = doc.data();
                    html += `<div class="leaderboard-entry">
                        <span class="leaderboard-rank">#${idx + 1}</span>
                        <span class="leaderboard-name">${data.username}</span>
                        <span class="leaderboard-score">Lvl ${data.level}</span>
                    </div>`;
                });
                document.getElementById('leaderboard').innerHTML = html;
            } catch (e) {
                console.error("Leaderboard load error:", e);
            }
        }

        async function sendChatMessage() {
            if (!currentUser) return;
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            try {
                await db.collection('chat').add({
                    username: currentUser.displayName || 'Anonyme',
                    text: msg,
                    timestamp: new Date()
                });
                input.value = '';
                loadChatMessages();
            } catch (e) {
                console.error("Chat error:", e);
            }
        }

        async function loadChatMessages() {
            try {
                const snapshot = await db.collection('chat')
                    .orderBy('timestamp', 'desc')
                    .limit(20)
                    .get();
                
                let html = '';
                const msgs = snapshot.docs.reverse();
                msgs.forEach(doc => {
                    const data = doc.data();
                    html += `<div class="message">
                        <span class="message-author">${data.username}</span>
                        <div class="message-text">${data.text}</div>
                    </div>`;
                });
                document.getElementById('chatMessages').innerHTML = html;
            } catch (e) {
                console.error("Chat load error:", e);
            }
        }

        function resetGameState() {
            gameState.level = 1;
            gameState.exp = 0;
            gameState.food = 100;
            gameState.water = 100;
            gameState.wood = 0;
            gameState.stone = 0;
            gameState.health = 100;
            gameState.survivalTime = 0;
        }

        // ============ GAME LOOP ============
        function startGameLoop() {
            updateStats();
            updateViewport("🌍 Bienvenue sur l'île...");
            
            setInterval(() => {
                gameState.decay();
                gameState.baseFrame++;
                updateStats();
                updateViewport();
            }, 500);

            setInterval(() => {
                saveGameState();
                loadLeaderboard();
                loadChatMessages();
            }, 5000);

            document.getElementById('chatSendBtn').onclick = sendChatMessage;
            document.getElementById('chatInput').onkeypress = (e) => {
                if (e.key === 'Enter') sendChatMessage();
            };
        }

        // Initialize
        initFirebase();
    </script>
</body>
</html>
